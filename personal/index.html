<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal — Damian Burgess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fffef8;
            --bg-card: #fff;
            --text: #2d3a2d;
            --text-muted: #6b7c6b;
            --citrus-orange: #ff8c42;
            --citrus-pink: #ff6b8a;
            --citrus-green: #7cb342;
            --citrus-yellow: #ffd54f;
            --citrus-lime: #c6ff00;
            --border: rgba(0,0,0,0.08);
            --handwritten: 'Caveat', cursive;
            --sans: 'Inter', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,140,66,0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255,107,138,0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(124,179,66,0.05) 0%, transparent 50%);
            color: var(--text);
            line-height: 1.6;
            font-size: 16px;
            min-height: 100vh;
        }

        a { color: inherit; text-decoration: none; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .back-link {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--citrus-orange); }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-family: var(--handwritten);
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--citrus-orange), var(--citrus-pink), var(--citrus-green));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .fruit-decoration {
            font-size: 1.5rem;
            margin: 0 0.25rem;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section h2 {
            font-family: var(--handwritten);
            font-size: 2.2rem;
            margin-bottom: 1.25rem;
            color: var(--citrus-orange);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .link-card {
            padding: 1.5rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .link-card:hover {
            transform: translateY(-4px) rotate(2deg);
            border-color: var(--citrus-orange);
            box-shadow: 0 8px 24px rgba(255,140,66,0.15);
        }

        .link-card .emoji {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .link-card h3 {
            font-family: var(--handwritten);
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        .link-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .link-card:nth-child(1):hover { border-color: var(--citrus-pink); }
        .link-card:nth-child(2):hover { border-color: var(--citrus-green); }
        .link-card:nth-child(3):hover { border-color: var(--citrus-yellow); }
        .link-card:nth-child(4):hover { border-color: var(--citrus-orange); }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.75rem;
        }

        .photo-item {
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 12px;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .photo-item:hover {
            border-color: var(--citrus-pink);
            transform: scale(1.03) rotate(1deg);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .see-more {
            display: inline-block;
            margin-top: 1.25rem;
            padding: 0.6rem 1.25rem;
            background: linear-gradient(135deg, var(--citrus-orange), var(--citrus-pink));
            color: white;
            border-radius: 25px;
            font-family: var(--handwritten);
            font-size: 1.3rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .see-more:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255,107,138,0.3);
        }

        .section-intro {
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        footer {
            border-top: 2px dashed var(--border);
            padding-top: 2rem;
            margin-top: 2rem;
            text-align: center;
        }

        footer a {
            color: var(--text-muted);
            transition: color 0.2s;
        }

        footer a:hover { color: var(--citrus-orange); }

        .footer-fruit {
            font-size: 1.5rem;
            margin-top: 1rem;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; }
            .link-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back-link">← back to home</a>

        <header>
            <h1>
                <span class="fruit-decoration">🍊</span>
                Personal Stuff
                <span class="fruit-decoration">🍋</span>
            </h1>
            <p>The fun side — life, music, and vibes</p>
        </header>

        <div class="section">
            <h2>🌿 Life Things</h2>
            <div class="link-grid">
                <a href="../cosmo/" class="link-card">
                    <div class="emoji">🐇</div>
                    <h3>Cosmo</h3>
                    <p>My rabbit (2018–2024)</p>
                </a>
                <a href="../clarinet/" class="link-card">
                    <div class="emoji">🎵</div>
                    <h3>Clarinet</h3>
                    <p>Performances & music</p>
                </a>
                <a href="../playlists/" class="link-card">
                    <div class="emoji">🎧</div>
                    <h3>Playlists</h3>
                    <p>Study jams</p>
                </a>
                <a href="../6-months/" class="link-card">
                    <div class="emoji">💝</div>
                    <h3>CTF for Lisa</h3>
                    <p>6-month puzzle</p>
                </a>
            </div>
        </div>

        <div class="section">
            <h2>📸 Photos</h2>
            <p class="section-intro">A few favorites from adventures</p>
            <div class="photo-grid">
                <div class="photo-item"><img src="../photos/pics/85.jpeg" alt="Fluffy clouds sunset"></div>
                <div class="photo-item"><img src="../photos/pics/38.jpeg" alt="Zion National Park"></div>
                <div class="photo-item"><img src="../photos/pics/25.jpeg" alt="Rainbow on Mist trail"></div>
                <div class="photo-item"><img src="../photos/pics/51.jpeg" alt="Carlsbad caverns"></div>
                <div class="photo-item"><img src="../photos/pics/54.jpeg" alt="Wallpaper sunset"></div>
                <div class="photo-item"><img src="../photos/pics/28.jpeg" alt="Half Dome"></div>
                <div class="photo-item"><img src="../photos/pics/145.jpeg" alt="Clouds from plane"></div>
                <div class="photo-item"><img src="../photos/pics/36.jpeg" alt="Golden leaves"></div>
            </div>
            <a href="../photos/" class="see-more">see all photos 🍑</a>
        </div>

        <footer>
            <a href="../">← back to home</a>
            <div class="footer-fruit">🍊🍋🍇🍑🍓</div>
        </footer>
    </div>
</body>
</html>
